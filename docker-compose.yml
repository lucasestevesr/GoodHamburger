services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: goodhamburger-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_PASSWORD:-GoodHamburger@12345}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goodhamburger-api
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=GoodHamburgerDb;User Id=sa;Password=${SQL_PASSWORD:-GoodHamburger@12345};TrustServerCertificate=True"
      Jwt__SecretKey: "${JWT_SECRET_KEY:?JWT_SECRET_KEY must be configured}"
      Jwt__Issuer: "GoodHamburger.Api"
      Jwt__Audience: "GoodHamburger.User"
      Jwt__ExpiresInMinutes: "60"
    ports:
      - "8080:8080"

volumes:
  sqlserver-data:
