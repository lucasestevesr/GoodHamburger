name: CI pipeline

on:
  push:
    branches: [ main, develop, "feature/**" ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  tests:
    uses: ./.github/workflows/run-tests.yml
    with:
      coverage_threshold: 80

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        run: docker build -t goodhamburger-api:ci -f Dockerfile .
