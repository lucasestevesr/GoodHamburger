name: CI pipeline

on:
  push:
    branches: [ main, develop, "feature/**" ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  tests:
    uses: ./.github/workflows/run-tests.yml
    with:
      coverage_threshold: 100

  docker-build:
    name: Docker builds
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t goodhamburger-api:ci -f src/GoodHamburger.Api/Dockerfile .

      - name: Build Web image
        run: docker build -t goodhamburger-web:ci -f src/GoodHamburger.Web/Dockerfile .
