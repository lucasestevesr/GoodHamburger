name: tests

on:
  workflow_call:
    inputs:
      coverage_threshold:
        required: false
        type: number
        default: 100

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      NUGET_XMLDOC_MODE: skip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: |
            src/**/packages.lock.json
            tests/**/packages.lock.json

      - name: Restore (locked)
        run: dotnet restore GoodHamburger.sln --locked-mode --verbosity minimal

      - name: Build
        run: dotnet build GoodHamburger.sln --configuration Release --no-restore --verbosity minimal

      - name: Test with coverage
        run: dotnet test GoodHamburger.sln --configuration Release --no-build --verbosity minimal --collect:"XPlat Code Coverage" --results-directory ./TestResults --logger "trx;LogFileName=test-results.trx"

      - name: Install reportgenerator
        run: dotnet tool install dotnet-reportgenerator-globaltool --tool-path ./.tools

      - name: Generate Domain coverage report
        run: ./.tools/reportgenerator -reports:"TestResults/**/coverage.cobertura.xml" -targetdir:"TestResults/CoverageReport" -reporttypes:"Cobertura" -assemblyfilters:"+GoodHamburger.Domain"

      - name: Publish Domain coverage summary
        shell: pwsh
        env:
          COVERAGE_THRESHOLD: ${{ inputs.coverage_threshold }}
        run: |
          $coveragePath = "TestResults/CoverageReport/Cobertura.xml"
          if (-not (Test-Path $coveragePath)) {
            throw "Coverage file was not generated."
          }

          [xml] $coverage = Get-Content $coveragePath
          $domainPackage = $coverage.coverage.packages.package | Where-Object { $_.name -eq "GoodHamburger.Domain" } | Select-Object -First 1
          if (-not $domainPackage) {
            throw "GoodHamburger.Domain was not found in the coverage report."
          }

          $threshold = [double] $env:COVERAGE_THRESHOLD
          $lineCoverage = [math]::Round(([double] $domainPackage.'line-rate') * 100, 2)
          $branchCoverage = [math]::Round(([double] $domainPackage.'branch-rate') * 100, 2)
          $status = if ($lineCoverage -ge $threshold) { "Passed" } else { "Failed" }

          Add-Content $env:GITHUB_STEP_SUMMARY "## Coverage"
          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY "| Metric | Current | Required | Status |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| --- | ---: | ---: | --- |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| Line coverage | $lineCoverage% | $threshold% | $status |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| Branch coverage | $branchCoverage% | Informational | - |"
          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY "### Domain"
          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY "| Class | Line | Branch |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| --- | ---: | ---: |"

          foreach ($class in $domainPackage.classes.class | Sort-Object name) {
            $classLineCoverage = [math]::Round(([double] $class.'line-rate') * 100, 2)
            $classBranchCoverage = [math]::Round(([double] $class.'branch-rate') * 100, 2)
            $className = $class.name -replace "^GoodHamburger\.Domain\.", ""
            Add-Content $env:GITHUB_STEP_SUMMARY "| ``$className`` | $classLineCoverage% | $classBranchCoverage% |"
          }

          if ($lineCoverage -lt $threshold) {
            throw "GoodHamburger.Domain line coverage is $lineCoverage%, below the required $threshold%."
          }
